server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /index.html =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy /api/* to the backend. proxy_buffering off keeps the SSE stream
    # unbuffered so tokens reach the browser as the model emits them.
    #
    # NOTE: the deployed backend is the `mastra build` artifact (node
    # .mastra/output/index.mjs), which serves the browser routes UNDER /api/*
    # (see src/mastra/index.ts). So the /api prefix must be PRESERVED — do not
    # strip it, or every call 404s. (The bare-path standalone Hono app in
    # src/server/app.ts is a dev-only convenience and not the deployed artifact.)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Domain $http_x_domain;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }
}
