server {
    listen 3000;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /index.html =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy /api/* to the backend K8s service.
    # Service DNS: {helm-release}-web-app.{namespace}.svc.cluster.local
    # Port 80 is the Helm chart's default service port; it targets the
    # container port (8000) declared in environments/backend.yaml.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://mongodb-mastra-retail-backend-web-app.maap.svc.cluster.local:80;
        proxy_http_version 1.1;
        proxy_set_header Host mongodb-mastra-retail-backend-web-app.maap.svc.cluster.local;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve the per-request domain pack header end-to-end.
        proxy_set_header X-Domain $http_x_domain;
        # Spec 550 (SSO): the Kanopy gateway injects the SSO JWT on the frontend
        # ingress as x-kanopy-internal-authorization. This /api hop crosses the
        # Istio mesh, which REPLACES that header with a SPIFFE mesh-internal JWT
        # pod-to-pod — so forward the original SSO JWT under x-original-sso-jwt,
        # which kanopy-gate prefers, so the backend still sees the real user.
        proxy_set_header x-kanopy-internal-authorization $http_x_kanopy_internal_authorization;
        proxy_set_header x-original-sso-jwt $http_x_kanopy_internal_authorization;
        # Keep SSE streams unbuffered so tokens flush to the browser
        # as the model emits them.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
